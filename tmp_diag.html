e-16<br>S2=1.0<br>S3=6.245004513516505e-16", "s=1.85 m<br>x=-0.4747828153895078 m<br>y=-0.47478281538950784 m<br>z=0.048827651045346226 m<br>Rb=Inf m<br>theta_b=0.25 turns<br>dtwist=0.0 turns/m<br>S1=4.996003610813203e-16<br>S2=1.0<br>S3=6.245004513516505e-16", "s=1.9 m<br>x=-0.5086859082524425 m<br>y=-0.5086859082524425 m<br>z=0.06301076031850748 m<br>Rb=Inf m<br>theta_b=0.25 turns<br>dtwist=0.0 turns/m<br>S1=4.996003610813203e-16<br>S2=1.0<br>S3=6.245004513516505e-16", "s=1.95 m<br>x=-0.5425890011153774 m<br>y=-0.5425890011153774 m<br>z=0.07719386959166881 m<br>Rb=Inf m<br>theta_b=0.25 turns<br>dtwist=0.0 turns/m<br>S1=4.996003610813203e-16<br>S2=1.0<br>S3=6.245004513516505e-16", "s=2.0 m<br>x=-0.5764920939783124 m<br>y=-0.5764920939783124 m<br>z=0.09137697886483014 m<br>Rb=Inf m<br>theta_b=0.25 turns<br>dtwist=0.0 turns/m<br>S1=4.996003610813203e-16<br>S2=1.0<br>S3=6.245004513516505e-16"];

    const fiberTrace = {
      type: "scatter3d",
      mode: "lines+markers",
      x: xs,
      y: ys,
      z: zs,
      text: hoverText,
      hovertemplate: "%{text}<extra></extra>",
      line: {
        width: 4,
        color: "rgba(30, 30, 30, 0.22)"
      },
      marker: {
        size: 3.5,
        color: ss,
        colorscale: "Turbo",
        cmin: ss[0],
        cmax: ss[ss.length - 1],
        colorbar: {
          title: "s (m)",
          len: 0.55,
          y: 0.5
        }
      }
    };

    const startTrace = {
      type: "scatter3d",
      mode: "markers",
      x: [0.0],
      y: [0.0],
      z: [0.0],
      hovertemplate: "Start<br>x=%{x} m<br>y=%{y} m<br>z=%{z} m<extra></extra>",
      marker: {
        size: 7,
        color: "#2ca02c",
        symbol: "circle"
      },
      name: "start"
    };

    const endTrace = {
      type: "scatter3d",
      mode: "markers",
      x: [-0.5764920939783124],
      y: [-0.5764920939783124],
      z: [0.09137697886483014],
      hovertemplate: "End<br>x=%{x} m<br>y=%{y} m<br>z=%{z} m<extra></extra>",
      marker: {
        size: 7,
        color: "#d62728",
        symbol: "circle"
      },
      name: "end"
    };

    const cursorTrace = {
      type: "scatter3d",
      mode: "markers",
      x: [xs[0]],
      y: [ys[0]],
      z: [zs[0]],
      hoverinfo: "skip",
      marker: {
        size: 6,
        color: "#111111",
        symbol: "circle"
      },
      name: "cursor"
    };

    const layout = {
      title: "FiberInput 3D centerline",
      showlegend: true,
      legend: { x: 0.02, y: 0.98 },
      margin: { l: 0, r: 0, b: 0, t: 48 },
      scene: {
        xaxis: { title: "x (m)" },
        yaxis: { title: "y (m)" },
        zaxis: { title: "z (m)" },
        camera: {
          eye: { x: 1.6, y: 1.6, z: 0.9 }
        }
      }
    };

    Plotly.newPlot("plot", [fiberTrace, startTrace, endTrace, cursorTrace], layout, {
      responsive: true,
      scrollZoom: true,
      displaylogo: false
    });

    const sphereU = [];
    const sphereV = [];
    const sphereW = [];
    for (let i = 0; i <= 30; i += 1) {
      const theta = Math.PI * i / 30;
      const rowU = [];
      const rowV = [];
      const rowW = [];
      for (let j = 0; j <= 60; j += 1) {
        const phi = 2 * Math.PI * j / 60;
        rowU.push(Math.sin(theta) * Math.cos(phi));
        rowV.push(Math.sin(theta) * Math.sin(phi));
        rowW.push(Math.cos(theta));
      }
      sphereU.push(rowU);
      sphereV.push(rowV);
      sphereW.push(rowW);
    }

    function circleTrace(axis) {
      const t = Array.from({ length: 181 }, (_, i) => 2 * Math.PI * i / 180);
      if (axis === "xy") {
        return { x: t.map(a => Math.cos(a)), y: t.map(a => Math.sin(a)), z: t.map(() => 0) };
      }
      if (axis === "xz") {
        return { x: t.map(a => Math.cos(a)), y: t.map(() => 0), z: t.map(a => Math.sin(a)) };
      }
      return { x: t.map(() => 0), y: t.map(a => Math.cos(a)), z: t.map(a => Math.sin(a)) };
    }

    const eqXY = circleTrace("xy");
    const eqXZ = circleTrace("xz");
    const eqYZ = circleTrace("yz");

    const sphereSurface = {
      type: "surface",
      x: sphereU,
      y: sphereV,
      z: sphereW,
      opacity: 0.18,
      showscale: false,
      colorscale: [[0, "#cfd8dc"], [1, "#cfd8dc"]],
      hoverinfo: "skip"
    };

    const sphereLines = [eqXY, eqXZ, eqYZ].map(curve => ({
      type: "scatter3d",
      mode: "lines",
      x: curve.x,
      y: curve.y,
      z: curve.z,
      line: { color: "#90a4ae", width: 4 },
      hoverinfo: "skip",
      showlegend: false
    }));

    const stateTrail = {
      type: "scatter3d",
      mode: "markers",
      x: [s1[0]],
      y: [s2[0]],
      z: [s3[0]],
      marker: {
        size: 3.5,
        color: [ss[0]],
        colorscale: "Turbo",
        cmin: ss[0],
        cmax: ss[ss.length - 1],
        showscale: false
      },
      hoverinfo: "skip",
      showlegend: false
    };

    const stateVector = {
      type: "scatter3d",
      mode: "lines",
      x: [0, s1[0]],
      y: [0, s2[0]],
      z: [0, s3[0]],
      line: { color: "#111111", width: 6 },
      hoverinfo: "skip",
      showlegend: false
    };

    const statePoint = {
      type: "scatter3d",
      mode: "markers",
      x: [s1[0]],
      y: [s2[0]],
      z: [s3[0]],
      hovertemplate: "Poincare state<br>S1=%{x:.4f}<br>S2=%{y:.4f}<br>S3=%{z:.4f}<extra></extra>",
      marker: { size: 6, color: "#ff7f0e" },
      name: "state"
    };

    const insetLayout = {
      margin: { l: 0, r: 0, b: 0, t: 26 },
      title: { text: "Poincare Sphere", x: 0.5, xanchor: "center", font: { size: 14 } },
      showlegend: false,
      scene: {
        xaxis: { title: "S1", range: [-1.05, 1.05] },
        yaxis: { title: "S2", range: [-1.05, 1.05] },
        zaxis: { title: "S3", range: [-1.05, 1.05] },
        aspectmode: "cube",
        camera: { eye: { x: 1.35, y: 1.35, z: 1.0 } }
      }
    };

    Plotly.newPlot(
      "inset",
      [sphereSurface, ...sphereLines, stateTrail, stateVector, statePoint],
      insetLayout,
      { responsive: true, displaylogo: false, scrollZoom: true }
    );

    const statusBox = document.getElementById("status");
    let activeIndex = 0;

    function formatStatus(index) {
      return [
        "s = " + ss[index].toFixed(4) + " m",
        "x = " + xs[index].toFixed(4) + " m",
        "y = " + ys[index].toFixed(4) + " m",
        "z = " + zs[index].toFixed(4) + " m",
        "Rb = " + (Number.isFinite(rb[index]) ? rb[index].toFixed(4) : "Inf") + " m",
        "theta_b = " + theta[index].toFixed(4) + " turns",
        "dtwist = " + dtwist[index].toFixed(4) + " turns/m",
        "S1 = " + s1[index].toFixed(4),
        "S2 = " + s2[index].toFixed(4),
        "S3 = " + s3[index].toFixed(4)
      ].join("\n");
    }

    function updateCursor(index) {
      activeIndex = Math.max(0, Math.min(xs.length - 1, index));
      Plotly.restyle("plot", {
        x: [[xs[activeIndex]]],
        y: [[ys[activeIndex]]],
        z: [[zs[activeIndex]]]
      }, [3]);
      Plotly.restyle("inset", {
        x: [s1.slice(0, activeIndex + 1)],
        y: [s2.slice(0, activeIndex + 1)],
        z: [s3.slice(0, activeIndex + 1)],
        "marker.color": [ss.slice(0, activeIndex + 1)]
      }, [4]);
      Plotly.restyle("inset", {
        x: [[0, s1[activeIndex]]],
        y: [[0, s2[activeIndex]]],
        z: [[0, s3[activeIndex]]]
      }, [5]);
      Plotly.restyle("inset", {
        x: [[s1[activeIndex]]],
        y: [[s2[activeIndex]]],
        z: [[s3[activeIndex]]]
      }, [6]);
      statusBox.textContent = formatStatus(activeIndex);
    }

    const viewer = document.getElementById("viewer");
    viewer.addEventListener("mousemove", event => {
      if (event.buttons !== 0) {
        return;
      }
      const rect = viewer.getBoundingClientRect();
      const t = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
      const index = Math.round(t * (xs.length - 1));
      if (index !== activeIndex) {
        updateCursor(index);
      }
    });

    viewer.addEventListener("touchmove", event => {
      if (event.touches.length === 0) {
        return;
      }
      const rect = viewer.getBoundingClientRect();
      const t = Math.max(0, Math.min(1, (event.touches[0].clientX - rect.left) / rect.width));
      const index = Math.round(t * (xs.length - 1));
      if (index !== activeIndex) {
        updateCursor(index);
      }
    }, { passive: true });

    updateCursor(0);
  </script>
</body>
