5523070318036 m<br>x=4.547540609121721 m<br>y=-4.383589625753446 m<br>z=-1.9759518706786754 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-1.6653345369377353e-16<br>S2=-0.4582620846721218<br>S3=0.8888171137821106", "s=56.489949233898315 m<br>x=3.993261848315674 m<br>y=-4.5424425084887785 m<br>z=-2.2412977396925844 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-1.6653345369377348e-16<br>S2=-0.4226515019893383<br>S3=0.9062922861120227", "s=57.12466776461628 m<br>x=3.4040181006001573 m<br>y=-4.701295391224113 m<br>z=-2.4157258929867536 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-1.6653345369377353e-16<br>S2=-0.38637587917705063<br>S3=0.9223414118373745", "s=57.75938629533424 m<br>x=2.794614962095387 m<br>y=-4.860148273959447 m<br>z=-2.4948535724925875 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-2.2204460492503126e-16<br>S2=-0.34949229575533475<br>S3=0.9369392377351189", "s=58.39410482605219 m<br>x=2.180364562591582 m<br>y=-5.019001156694779 m<br>z=-2.476692581527076 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-1.6653345369377348e-16<br>S2=-0.3120587878673966<br>S3=0.9500627941955896", "s=59.028823356770154 m<br>x=1.5767008262788282 m<br>y=-5.177854039430113 m<br>z=-2.361699241092216 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-2.220446049250313e-16<br>S2=-0.2741342569599742<br>S3=0.9616914313650731", "s=59.66354188748811 m<br>x=0.9987916722176543 m<br>y=-5.336706922165446 m<br>z=-2.15276292415394 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-3.33066907387547e-16<br>S2=-0.23577837710219476<br>S3=0.9718068516382539", "s=60.29826041820607 m<br>x=0.46115789857073486 m<br>y=-5.49555980490078 m<br>z=-1.8551334559932506 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-2.775557561562891e-16<br>S2=-0.1970515010887069<br>S3=0.9803931384494117", "s=60.93297894892403 m<br>x=-0.022691673322601913 m<br>y=-5.654412687636114 m<br>z=-1.4762892048001297 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-2.220446049250313e-16<br>S2=-0.15801456547484818<br>S3=0.9874367813170597", "s=61.567697479641986 m<br>x=-0.4405996274996657 m<br>y=-5.813265570371446 m<br>z=-1.0257491769236105 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-2.7755575615628914e-16<br>S2=-0.11872899469326358<br>S3=0.9929266971026245", "s=62.20241601035995 m<br>x=-0.7820654259251323 m<br>y=-5.972118453106781 m<br>z=-0.5148338381549447 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-2.775557561562892e-16<br>S2=-0.07925660440285144<br>S3=0.9968542474497111", "s=62.8371345410779 m<br>x=-1.0385092496022663 m<br>y=-6.130971335842113 m<br>z=0.043619329247017946 m<br>Rb=4.0 m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-3.33066907387547e-16<br>S2=-0.03965950422212106<br>S3=0.9992132523765163", "s=63.47185307179586 m<br>x=-1.203487578857583 m<br>y=-6.289824218577447 m<br>z=0.6355783867497867 m<br>Rb=Inf m<br>theta_b=0.0 turns<br>dtwist=0.0 turns/m<br>S1=-4.440892098500626e-16<br>S2=3.5431376556124717e-16<br>S3=1.0"];

    const fiberTrace = {
      type: "scatter3d",
      mode: "lines+markers",
      x: xs,
      y: ys,
      z: zs,
      text: hoverText,
      hovertemplate: "%{text}<extra></extra>",
      line: {
        width: 4,
        color: "rgba(30, 30, 30, 0.22)"
      },
      marker: {
        size: 3.5,
        color: ss,
        colorscale: "Turbo",
        cmin: ss[0],
        cmax: ss[ss.length - 1],
        colorbar: {
          title: "s (m)",
          len: 0.55,
          y: 0.5
        }
      }
    };

    const startTrace = {
      type: "scatter3d",
      mode: "markers",
      x: [0.0],
      y: [0.0],
      z: [0.0],
      hovertemplate: "Start<br>x=%{x} m<br>y=%{y} m<br>z=%{z} m<extra></extra>",
      marker: {
        size: 7,
        color: "#2ca02c",
        symbol: "circle"
      },
      name: "start"
    };

    const endTrace = {
      type: "scatter3d",
      mode: "markers",
      x: [-1.203487578857583],
      y: [-6.289824218577447],
      z: [0.6355783867497867],
      hovertemplate: "End<br>x=%{x} m<br>y=%{y} m<br>z=%{z} m<extra></extra>",
      marker: {
        size: 7,
        color: "#d62728",
        symbol: "circle"
      },
      name: "end"
    };

    const cursorTrace = {
      type: "scatter3d",
      mode: "markers",
      x: [xs[0]],
      y: [ys[0]],
      z: [zs[0]],
      hoverinfo: "skip",
      marker: {
        size: 6,
        color: "#111111",
        symbol: "circle"
      },
      name: "cursor"
    };

    const layout = {
      title: "FiberInput 3D centerline",
      showlegend: true,
      legend: { x: 0.02, y: 0.98 },
      margin: { l: 0, r: 0, b: 0, t: 48 },
      scene: {
        xaxis: { title: "x (m)" },
        yaxis: { title: "y (m)" },
        zaxis: { title: "z (m)" },
        camera: {
          eye: { x: 1.6, y: 1.6, z: 0.9 }
        }
      }
    };

    Plotly.newPlot("plot", [fiberTrace, startTrace, endTrace, cursorTrace], layout, {
      responsive: true,
      scrollZoom: true,
      displaylogo: false
    });

    const sphereU = [];
    const sphereV = [];
    const sphereW = [];
    for (let i = 0; i <= 30; i += 1) {
      const theta = Math.PI * i / 30;
      const rowU = [];
      const rowV = [];
      const rowW = [];
      for (let j = 0; j <= 60; j += 1) {
        const phi = 2 * Math.PI * j / 60;
        rowU.push(Math.sin(theta) * Math.cos(phi));
        rowV.push(Math.sin(theta) * Math.sin(phi));
        rowW.push(Math.cos(theta));
      }
      sphereU.push(rowU);
      sphereV.push(rowV);
      sphereW.push(rowW);
    }

    function circleTrace(axis) {
      const t = Array.from({ length: 181 }, (_, i) => 2 * Math.PI * i / 180);
      if (axis === "xy") {
        return { x: t.map(a => Math.cos(a)), y: t.map(a => Math.sin(a)), z: t.map(() => 0) };
      }
      if (axis === "xz") {
        return { x: t.map(a => Math.cos(a)), y: t.map(() => 0), z: t.map(a => Math.sin(a)) };
      }
      return { x: t.map(() => 0), y: t.map(a => Math.cos(a)), z: t.map(a => Math.sin(a)) };
    }

    const eqXY = circleTrace("xy");
    const eqXZ = circleTrace("xz");
    const eqYZ = circleTrace("yz");

    const sphereSurface = {
      type: "surface",
      x: sphereU,
      y: sphereV,
      z: sphereW,
      opacity: 0.18,
      showscale: false,
      colorscale: [[0, "#cfd8dc"], [1, "#cfd8dc"]],
      hoverinfo: "skip"
    };

    const sphereLines = [eqXY, eqXZ, eqYZ].map(curve => ({
      type: "scatter3d",
      mode: "lines",
      x: curve.x,
      y: curve.y,
      z: curve.z,
      line: { color: "#90a4ae", width: 4 },
      hoverinfo: "skip",
      showlegend: false
    }));

    const stateTrail = {
      type: "scatter3d",
      mode: "markers",
      x: [s1[0]],
      y: [s2[0]],
      z: [s3[0]],
      marker: {
        size: 3.5,
        color: [ss[0]],
        colorscale: "Turbo",
        cmin: ss[0],
        cmax: ss[ss.length - 1],
        showscale: false
      },
      hoverinfo: "skip",
      showlegend: false
    };

    const stateVector = {
      type: "scatter3d",
      mode: "lines",
      x: [0, s1[0]],
      y: [0, s2[0]],
      z: [0, s3[0]],
      line: { color: "#111111", width: 6 },
      hoverinfo: "skip",
      showlegend: false
    };

    const statePoint = {
      type: "scatter3d",
      mode: "markers",
      x: [s1[0]],
      y: [s2[0]],
      z: [s3[0]],
      hovertemplate: "Poincare state<br>S1=%{x:.4f}<br>S2=%{y:.4f}<br>S3=%{z:.4f}<extra></extra>",
      marker: { size: 6, color: "#ff7f0e" },
      name: "state"
    };

    const insetLayout = {
      margin: { l: 0, r: 0, b: 0, t: 26 },
      title: { text: "Poincare Sphere", x: 0.5, xanchor: "center", font: { size: 14 } },
      showlegend: false,
      scene: {
        xaxis: { title: "S1", range: [-1.05, 1.05] },
        yaxis: { title: "S2", range: [-1.05, 1.05] },
        zaxis: { title: "S3", range: [-1.05, 1.05] },
        aspectmode: "cube",
        camera: { eye: { x: 1.35, y: 1.35, z: 1.0 } }
      }
    };

    Plotly.newPlot(
      "inset",
      [sphereSurface, ...sphereLines, stateTrail, stateVector, statePoint],
      insetLayout,
      { responsive: true, displaylogo: false, scrollZoom: true }
    );

    const statusBox = document.getElementById("status");
    let activeIndex = 0;

    function formatStatus(index) {
      return [
        "s = " + ss[index].toFixed(4) + " m",
        "x = " + xs[index].toFixed(4) + " m",
        "y = " + ys[index].toFixed(4) + " m",
        "z = " + zs[index].toFixed(4) + " m",
        "Rb = " + (Number.isFinite(rb[index]) ? rb[index].toFixed(4) : "Inf") + " m",
        "theta_b = " + theta[index].toFixed(4) + " turns",
        "dtwist = " + dtwist[index].toFixed(4) + " turns/m",
        "S1 = " + s1[index].toFixed(4),
        "S2 = " + s2[index].toFixed(4),
        "S3 = " + s3[index].toFixed(4)
      ].join("\n");
    }

    function updateCursor(index) {
      activeIndex = Math.max(0, Math.min(xs.length - 1, index));
      Plotly.restyle("plot", {
        x: [[xs[activeIndex]]],
        y: [[ys[activeIndex]]],
        z: [[zs[activeIndex]]]
      }, [3]);
      Plotly.restyle("inset", {
        x: [s1.slice(0, activeIndex + 1)],
        y: [s2.slice(0, activeIndex + 1)],
        z: [s3.slice(0, activeIndex + 1)],
        "marker.color": [ss.slice(0, activeIndex + 1)]
      }, [4]);
      Plotly.restyle("inset", {
        x: [[0, s1[activeIndex]]],
        y: [[0, s2[activeIndex]]],
        z: [[0, s3[activeIndex]]]
      }, [5]);
      Plotly.restyle("inset", {
        x: [[s1[activeIndex]]],
        y: [[s2[activeIndex]]],
        z: [[s3[activeIndex]]]
      }, [6]);
      statusBox.textContent = formatStatus(activeIndex);
    }

    const viewer = document.getElementById("viewer");
    viewer.addEventListener("mousemove", event => {
      if (event.buttons !== 0) {
        return;
      }
      const rect = viewer.getBoundingClientRect();
      const t = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
      const index = Math.round(t * (xs.length - 1));
      if (index !== activeIndex) {
        updateCursor(index);
      }
    });

    viewer.addEventListener("touchmove", event => {
      if (event.touches.length === 0) {
        return;
      }
      const rect = viewer.getBoundingClientRect();
      const t = Math.max(0, Math.min(1, (event.touches[0].clientX - rect.left) / rect.width));
      const index = Math.round(t * (xs.length - 1));
      if (index !== activeIndex) {
        updateCursor(index);
      }
    }, { passive: true });

    updateCursor(0);
  </script>
</body>
</html>
